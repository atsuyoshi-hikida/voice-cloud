<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Cloud</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(
      to bottom,
      #eaf5ff 0%,
      #d6ecff 60%,
      #cfe8ff 100%
    );
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .bubble {
    position: absolute;
    max-width: 260px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.95);
    border: 2px solid #444;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    word-break: break-word;
    pointer-events: none;
    user-select: none;
  }

  .bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 28px;
    border-width: 14px 12px 0;
    border-style: solid;
    border-color: #444 transparent transparent;
  }

  .new {
    animation: pulse 1.6s ease-out;
  }

  @keyframes pulse {
    0%   { transform: scale(1.25); opacity: 0; }
    60%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1.0); opacity: 1; }
  }

  /* スマホ：完全操作無効 */
  @media (max-width: 768px) {
    * {
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  }
</style>
</head>

<body>
<div id="stage"></div>

<script>
/* ===== 設定 ===== */
const API_URL = "https://script.google.com/macros/s/AKfycbwR5S9hM13kxQjMn2CDc9pZsytXvoQ9xKPVOjRhpKTXK41ljbOmAiPVf3Cfpcwo4Afw/exec";
const UPDATE_INTERVAL = 5000;
const isMobile = window.matchMedia("(max-width: 768px)").matches;

/* ===== レイヤー設計 ===== */
const LAYERS = isMobile ? 3 : 5;

const RADII = isMobile
  ? [80, 140, 220]                // 密な雲
  : [140, 300, 520, 760, 1040];

const SIZE = isMobile
  ? [1.05, 0.85, 0.65]            // ★ サイズ差
  : [1.0, 0.8, 0.6, 0.5, 0.4];

const OPACITY = isMobile
  ? [1.0, 0.7, 0.45]              // ★ 奥行き感
  : [1.0, 0.8, 0.6, 0.4, 0.25];

const FLOAT_RADIUS_BASE = isMobile ? 70 : 120;
const FLOAT_SPEED_BASE  = isMobile ? 0.003 : 0.002;
const NOISE_RADIUS = isMobile ? 12 : 18;
const NOISE_SPEED  = 0.015;

/* ===== 状態 ===== */
const stage = document.getElementById("stage");
let bubbles = {};
let previousLatestText = null;
let lastTime = performance.now();

/* ===== アニメーション ===== */
function animate(now) {
  const delta = Math.min((now - lastTime) / 16.666, 2);
  lastTime = now;

  Object.values(bubbles).forEach(b => {
    b.phase += b.floatSpeed * delta;
    b.noisePhase += NOISE_SPEED * delta;

    const fx = Math.cos(b.phase) * b.floatRadius;
    const fy = Math.sin(b.phase) * b.floatRadius;
    const nx = Math.cos(b.noisePhase * 1.7) * NOISE_RADIUS;
    const ny = Math.sin(b.noisePhase * 1.3) * NOISE_RADIUS;

    const tx = b.baseX + fx + nx;
    const ty = b.baseY + fy + ny;

    b.x += (tx - b.x) * 0.07 * delta;
    b.y += (ty - b.y) * 0.07 * delta;

    b.el.style.left = `${b.x}px`;
    b.el.style.top  = `${b.y}px`;
  });

  requestAnimationFrame(animate);
}

/* ===== 更新 ===== */
async function update() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const total = data.messages.length;
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const perLayer = Math.ceil(total / LAYERS);

  const latestText = data.messages[0]?.text;
  const hasNew = latestText && latestText !== previousLatestText;
  previousLatestText = latestText;

  const newBubbles = {};
  const layerCounts = Array(LAYERS).fill(0);
  const angleOffset = Math.random() * Math.PI * 2;

  data.messages.forEach((msg, i) => {
    const layer = Math.floor(i / perLayer);
    if (layer >= LAYERS) return;

    const count = layerCounts[layer]++;
    const angle = angleOffset + count * (2 * Math.PI / perLayer);

    const baseX = cx + Math.cos(angle) * RADII[layer];
    const baseY = cy + Math.sin(angle) * RADII[layer];

    let bubble = bubbles[msg.text];

    if (!bubble) {
      const el = document.createElement("div");
      el.className = "bubble";
      el.textContent = msg.text;
      el.style.transform = `scale(${SIZE[layer]})`;
      el.style.opacity = OPACITY[layer];
      stage.appendChild(el);

      bubble = {
        el,
        x: baseX,
        y: baseY,
        baseX,
        baseY,
        phase: Math.random() * Math.PI * 2,
        noisePhase: Math.random() * Math.PI * 2,
        floatRadius: FLOAT_RADIUS_BASE * (0.8 + Math.random() * 0.4),
        floatSpeed:  FLOAT_SPEED_BASE  * (0.8 + Math.random() * 0.4)
      };

      if (hasNew && i === 0) el.classList.add("new");
    }

    newBubbles[msg.text] = bubble;
  });

  stage.innerHTML = "";
  Object.values(newBubbles).forEach(b => stage.appendChild(b.el));
  bubbles = newBubbles;
}

/* ===== 起動 ===== */
update();
requestAnimationFrame(animate);
setInterval(update, UPDATE_INTERVAL);
</script>
</body>
</html>
