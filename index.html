<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Cloud</title>

<style>
  body {
    margin: 0;
    background: linear-gradient(
      to bottom,
      #eaf5ff 0%,
      #d6ecff 60%,
      #cfe8ff 100%
    );
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .bubble {
    max-width: 280px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.95);
    border: 2px solid #444;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    word-break: break-word;
    pointer-events: none;
    user-select: none;
  }

  .bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 30px;
    border-width: 14px 12px 0;
    border-style: solid;
    border-color: #444 transparent transparent;
  }

  .new {
    animation: pop 1.6s ease-out;
  }

  @keyframes pop {
    0%   { transform: scale(1.2); opacity: 0; }
    60%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1.0); opacity: 1; }
  }

  /* ===== スマホ専用 ===== */
  @media (max-width: 768px) {
    body {
      overflow: auto;
    }

    #stage {
      height: auto;
      min-height: 100vh;
      padding: 40px 0;
    }

    .bubble {
      position: relative;
      margin: 0 auto 28px auto;
      max-width: 85%;
      font-size: 14px;
    }

    .bubble::after {
      left: 24px;
    }

    * {
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  }
</style>
</head>

<body>
<div id="stage"></div>

<script>
/* ===== 設定 ===== */
const API_URL = "https://script.google.com/macros/s/AKfycbwR5S9hM13kxQjMn2CDc9pZsytXvoQ9xKPVOjRhpKTXK41ljbOmAiPVf3Cfpcwo4Afw/exec";
const UPDATE_INTERVAL = 5000;
const isMobile = window.matchMedia("(max-width: 768px)").matches;

/* PC用設定 */
const LAYERS  = isMobile ? 1 : 5;
const SIZE    = isMobile ? [1.0] : [1.0, 0.8, 0.6, 0.5, 0.4];
const OPACITY = isMobile ? [1.0] : [1.0, 0.8, 0.6, 0.4, 0.25];
const Z       = isMobile ? [10]  : [50, 40, 30, 20, 10];
const RADII   = [140, 300, 520, 760, 1040];
const FLOAT_RADIUS_BASE = isMobile ? 0 : 120;
const FLOAT_SPEED_BASE  = isMobile ? 0 : 0.002;
const NOISE_RADIUS = isMobile ? 0 : 18;
const NOISE_SPEED  = isMobile ? 0 : 0.015;

/* ===== 状態 ===== */
const stage = document.getElementById("stage");
let bubbles = {};
let previousLatestText = null;
let lastTime = performance.now();

/* ===== アニメーション（PCのみ）===== */
function animate(now) {
  if (isMobile) return;

  const delta = Math.min((now - lastTime) / 16.666, 2);
  lastTime = now;

  Object.values(bubbles).forEach(b => {
    b.phase += b.floatSpeed * delta;
    b.noisePhase += NOISE_SPEED * delta;

    const floatX = Math.cos(b.phase) * b.floatRadius;
    const floatY = Math.sin(b.phase) * b.floatRadius;
    const noiseX = Math.cos(b.noisePhase * 1.7) * NOISE_RADIUS;
    const noiseY = Math.sin(b.noisePhase * 1.3) * NOISE_RADIUS;

    b.x += (b.baseX + floatX + noiseX - b.x) * 0.06 * delta;
    b.y += (b.baseY + floatY + noiseY - b.y) * 0.06 * delta;

    b.el.style.left = `${b.x}px`;
    b.el.style.top  = `${b.y}px`;
  });

  requestAnimationFrame(animate);
}

/* ===== データ更新 ===== */
async function update() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const latestText = data.messages[0]?.text;
  const hasNew = latestText && latestText !== previousLatestText;
  previousLatestText = latestText;

  stage.innerHTML = "";
  bubbles = {};

  if (isMobile) {
    /* === スマホ：縦スクロール === */
    data.messages.forEach((msg, i) => {
      const el = document.createElement("div");
      el.className = "bubble";
      el.textContent = msg.text;
      if (hasNew && i === 0) el.classList.add("new");
      stage.appendChild(el);
    });
    return;
  }

  /* === PC：浮遊 === */
  const total = data.messages.length;
  const centerX = window.innerWidth / 2;
  const centerY = window.innerHeight / 2;
  const perLayer = Math.ceil(total / LAYERS);
  const layerCounts = Array(LAYERS).fill(0);
  const angleOffset = Math.random() * Math.PI * 2;

  data.messages.forEach((msg, i) => {
    const layer = Math.floor(i / perLayer);
    if (layer >= LAYERS) return;

    const count = layerCounts[layer]++;
    const angle = angleOffset + count * (2 * Math.PI / perLayer);
    const baseX = centerX + Math.cos(angle) * RADII[layer];
    const baseY = centerY + Math.sin(angle) * RADII[layer];

    const el = document.createElement("div");
    el.className = "bubble";
    el.textContent = msg.text;
    el.style.position = "absolute";
    el.style.transform = `scale(${SIZE[layer]})`;
    el.style.opacity = OPACITY[layer];
    el.style.zIndex = Z[layer];
    stage.appendChild(el);

    bubbles[msg.text] = {
      el,
      x: baseX,
      y: baseY,
      baseX,
      baseY,
      phase: Math.random() * Math.PI * 2,
      noisePhase: Math.random() * Math.PI * 2,
      floatRadius: FLOAT_RADIUS_BASE,
      floatSpeed: FLOAT_SPEED_BASE
    };

    if (hasNew && i === 0) el.classList.add("new");
  });
}

/* ===== 起動 ===== */
update();
if (!isMobile) requestAnimationFrame(animate);
setInterval(update, UPDATE_INTERVAL);
</script>
</body>
</html>
``
