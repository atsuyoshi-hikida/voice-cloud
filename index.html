<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Cloud</title>

<style>
  body {
    margin: 0;
    background: linear-gradient(
      to bottom,
      #eaf5ff 0%,
      #d6ecff 60%,
      #cfe8ff 100%
    );
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .bubble {
    max-width: 280px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.95);
    border: 2px solid #444;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    word-break: break-word;
    pointer-events: none;
    user-select: none;
  }

  .bubble::after {
    content: "";
    position: absolute;
    bottom: -14px;
    left: 30px;
    border-width: 14px 12px 0;
    border-style: solid;
    border-color: #444 transparent transparent;
  }

  /* === スマホ用：ふわふわ === */
  @keyframes floatSoft {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-10px); }
    100% { transform: translateY(0); }
  }

  .float-a { animation: floatSoft 6s ease-in-out infinite; }
  .float-b { animation: floatSoft 7.5s ease-in-out infinite; }
  .float-c { animation: floatSoft 9s ease-in-out infinite; }

  .new {
    animation: pulse 1.6s ease-out;
  }

  @keyframes pulse {
    0%   { transform: scale(1.2); opacity: 0; }
    60%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1.0); opacity: 1; }
  }

  /* ===== スマホ ===== */
  @media (max-width: 768px) {
    body {
      overflow: auto;
    }

    #stage {
      height: auto;
      min-height: 100vh;
      padding: 40px 0 80px;
    }

    .bubble {
      position: relative;
      margin: 0 auto 36px auto;
      max-width: 85%;
      font-size: 14px;
    }

    * {
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  }
</style>
</head>
